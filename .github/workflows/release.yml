name: release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Packaging acceptance check
        run: python scripts/validate.py
      - name: Skill standard check
        run: python scripts/validate_skill.py
      - name: Unit tests
        # Offline suite uses fakes only; it needs pyyaml (run_evals imports it) +
        # pytest, but none of the heavy SDKs (anthropic/openai/claude-agent-sdk are
        # imported lazily inside make_chat/make_coach, never at test time).
        run: uv run --with pytest --with pyyaml python -m pytest -q tests/
      - name: Version consistency check
        run: python scripts/bump-version.py --check
      - name: Tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="$(python -c 'import json; print(json.load(open("package.json"))["version"])')"
          test "${GITHUB_REF_NAME}" = "v${VERSION}"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --generate-notes --title "${{ github.ref_name }}"
