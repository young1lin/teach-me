id: m5-just-tell-me
source: teach-me-scenarios.md#M5
description: '别问了，直接告诉我 -> escape hatch outranks socratic; direct explanation'
setup: { platform: claude-code }
turns:
  - "/teach-me --socratic recursion"
  - "别问了，直接告诉我"
asserts: []   # judge-only: a direct explanation may still end with a comprehension check
judge:
  rubric: |
    After "别问了，直接告诉我", the coach must switch to a direct explanation of the
    concept in the next turn. Fail if it responds with yet another probing question
    or keeps withholding the explanation.
samples: 3
pass_threshold: 2
