interface:
  display_name: "Teach Me"
  short_description: "Learn from your work or a topic to observable understanding"
  default_prompt: "Use $teach-me to learn a topic to demonstrated understanding."
# Hard gate: this skill runs only on an explicit `$teach-me` in the user's message.
# It must never be auto-loaded or invoked from an implicit/ambient topic match.
policy:
  allow_implicit_invocation: false
